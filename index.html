<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
body{background:var(--bg)}
:root{
  --bg:#07091b;--s1:#0c1230;--s2:#101840;--s3:#141f50;
  --bd:rgba(255,255,255,.055);--bd2:rgba(255,255,255,.1);
  --text:#edf2fc;--t2:#adb9d4;--t3:#8090b0;
  --brand:#4f66ff;--brgb:79,102,255;--brand2:#7c8cff;
  --bsoft:rgba(79,102,255,.1);--bbd:rgba(79,102,255,.22);
  --ok:#22c55e;--okrgb:34,197,94;--oksoft:rgba(34,197,94,.08);--okbd:rgba(34,197,94,.25);
  --warn:#f59e0b;--danger:#ef4444;
  --fh:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
  --max:480px;
}
#root{display:flex;flex-direction:column}
/* Full-screen app shell */
.app-shell{
  position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0,rgba(var(--brgb),.07) 0%,transparent 55%),var(--bg);
}
/* On desktop: centre a phone-width column */
@media(min-width:600px){
  .app-shell{align-items:center}
  .app-col{width:var(--max);height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}
}
.app-col{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;width:100%}
.sc{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sc::-webkit-scrollbar{display:none}

/* ── 1. Directional slide transitions ── */
@keyframes sR{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes sL{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes sU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.tr{animation:sR .26s cubic-bezier(.22,1,.36,1)}
.tl{animation:sL .26s cubic-bezier(.22,1,.36,1)}
.tu{animation:sU .22s cubic-bezier(.22,1,.36,1)}

/* ── 3. Template sheet ── */
@keyframes shup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  border-radius:24px 24px 0 0;
  background:#0d1438;border-top:1px solid rgba(255,255,255,.13);
  z-index:50;animation:shup .32s cubic-bezier(.22,1,.36,1);
}
.sheet-scrim{position:absolute;inset:0;background:rgba(0,0,0,.58);z-index:49}

/* ── 6. Rest timer pulse ── */
@keyframes rpulse{
  0%,100%{box-shadow:0 0 0 0 rgba(var(--brgb),0)}
  50%{box-shadow:0 0 0 8px rgba(var(--brgb),.13),0 0 18px rgba(var(--brgb),.07)}
}
.rb-on{animation:rpulse 2.4s ease-in-out infinite}

/* ── 7. Nav ── */
.nav{
  height:58px;background:rgba(7,11,32,.92);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,.08);border-radius:30px;
  display:flex;align-items:center;overflow:hidden
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:transparent;border:none;cursor:pointer;padding:8px 0 6px;
  color:var(--t3);font-family:var(--fb);transition:color .18s
}
.nb.on{color:var(--brand2)}
.nb svg{display:block}
.nlbl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.npill{height:3px;border-radius:1.5px;background:var(--brand);margin-top:3px;
  transition:width .22s cubic-bezier(.22,1,.36,1),opacity .22s}

/* ── buttons ── */
.cta{
  width:100%;height:54px;border-radius:27px;
  background:linear-gradient(135deg,#2d3b8d 0%,var(--brand) 55%,var(--brand2) 100%);
  color:#fff;font-family:var(--fh);font-size:16px;font-weight:700;border:none;cursor:pointer;
  box-shadow:0 8px 28px rgba(var(--brgb),.32);transition:transform .12s,box-shadow .12s;
  display:flex;align-items:center;justify-content:center;letter-spacing:.01em
}
.cta:active{transform:scale(.97);box-shadow:0 4px 14px rgba(var(--brgb),.2)}
.gh{
  height:38px;padding:0 14px;border-radius:19px;background:rgba(255,255,255,.05);
  border:1px solid var(--bd2);color:var(--t2);font-family:var(--fb);font-size:12px;font-weight:600;
  cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;
  justify-content:center;white-space:nowrap
}
.gh:active{background:var(--s2);color:var(--text)}
.finish{height:38px;padding:0 18px;border-radius:19px;background:var(--ok);color:#022b14;
  font-family:var(--fh);font-size:13px;font-weight:700;border:none;cursor:pointer;flex-shrink:0}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:18px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}
.pg-eye{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.pg-h{font-family:var(--fh);font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.02em}

/* ── 9. Stat tiles — tightened type ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.st{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:14px}
.sl2{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.sv{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.02em;
  line-height:1;font-variant-numeric:tabular-nums}
.sv span{font-size:12px;color:var(--t2);margin-left:2px;font-weight:600}

/* ── set rows ── */
.sw{display:grid;gap:7px;margin-top:14px}
.shd{display:grid;grid-template-columns:38px 1fr 1fr 44px;gap:8px;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--t2);padding:0 2px 2px;text-align:center}
.sr{display:grid;grid-template-columns:38px 1fr 1fr 44px;gap:8px;align-items:center}
.sn{width:38px;height:44px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;
  font-weight:700;color:var(--t2);transition:background .2s,border-color .2s,color .2s}
.si{height:44px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);color:var(--text);
  font-family:var(--fh);font-size:18px;font-weight:700;text-align:center;width:100%;
  font-variant-numeric:tabular-nums;transition:background .2s,border-color .2s,color .2s}
.si:focus{outline:none;border-color:var(--brand);background:rgba(var(--brgb),.08)}
.ck{width:44px;height:44px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;
  color:transparent;transition:background .2s,border-color .2s,color .2s}
.sr.done .sn{background:var(--oksoft);border-color:var(--okbd);color:var(--ok)}
.sr.done .si{background:var(--oksoft);border-color:var(--okbd);color:var(--ok)}
.sr.done .ck{background:var(--ok);border-color:var(--ok);color:#022b14}

/* ── chips ── */
.chip{display:inline-flex;align-items:center;padding:0 9px;height:22px;border-radius:11px;
  font-size:11px;font-weight:700;letter-spacing:.03em;background:var(--bsoft);border:1px solid var(--bbd);color:var(--brand2)}
.chipok{background:var(--oksoft);border:1px solid var(--okbd);color:var(--ok)}

/* ── history rows ── */
.hi{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--bd);gap:12px;cursor:pointer}
.hi:last-child{border-bottom:none}
.hd{width:7px;height:7px;border-radius:50%;background:var(--brand);flex-shrink:0}
.hd.meas{background:var(--t3)}

/* ── exercise rows ── */
.er{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bd)}
.er:last-child{border-bottom:none}

/* ── settings rows ── */
.setr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bd)}
.setr:last-child{border-bottom:none}
.seti{width:80px;height:38px;border-radius:10px;background:var(--s2);border:1px solid var(--bd);
  color:var(--text);font-family:var(--fh);font-size:15px;font-weight:700;text-align:center}
.seti:focus{outline:none;border-color:var(--brand)}
.div{height:1px;background:var(--bd);margin:22px 0}

/* ── session header ── */
.sesh{position:sticky;top:0;background:var(--bg);z-index:10;padding:14px 20px 12px;
  margin:0 -20px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;gap:12px}

/* ── rest banner ── */
.rb{background:linear-gradient(135deg,rgba(10,16,52,.95),rgba(14,22,60,.95));
  border:1px solid var(--bbd);border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
  transition:border-color .4s}
.rc{font-family:var(--fh);font-size:36px;font-weight:800;color:var(--brand2);
  font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}

/* ── exercise card ── */
.ec{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:16px;margin-bottom:10px}
.en{font-family:var(--fh);font-size:17px;font-weight:700;color:var(--brand2)}

/* ── chart ── */
.cw{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:16px}

/* ── 8. Empty states ── */
.empty{display:flex;flex-direction:column;align-items:center;padding:40px 24px;text-align:center;gap:10px}
</style>
</head>

/* ── 4. WORKOUTS VIEW with 7-day row ── */
function WorkoutsView({onStart}){
  const d=new Date();
  const day=d.toLocaleDateString('en-US',{weekday:'long'});
  const date=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const dow=d.getDay();
  const monday=new Date(d);
  monday.setDate(d.getDate()-((dow+6)%7));
  const weekDays=Array.from({length:7},(_,i)=>{const dd=new Date(monday);dd.setDate(monday.getDate()+i);return dd;});

/* ── 2. SESSION VIEW with progress indicator ── */
function SessionView({onFinish}){
  const [sess,setSess]=useState(INIT_SESS);
  const [elapsed,setEl]=useState(1847);
  const [rest,setRest]=useState(67);
  const [restOn,setRestOn]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setEl(s=>s+1),1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{
    if(!restOn)return;
    const t=setInterval(()=>setRest(s=>{if(s<=1){setRestOn(false);return 0;}return s-1;}),1000);
    return()=>clearInterval(t);
  },[restOn]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const toggle=(exId,sId)=>{
    setSess(p=>({...p,exercises:p.exercises.map(ex=>
      ex.id===exId?{...ex,sets:ex.sets.map(s=>s.id===sId?{...s,done:!s.done}:s)}:ex
    )}));
    setRest(90);setRestOn(true);
  };
  const upd=(exId,sId,f,v)=>setSess(p=>({...p,exercises:p.exercises.map(ex=>
    ex.id===exId?{...ex,sets:ex.sets.map(s=>s.id===sId?{...s,[f]:v}:s)}:ex
  )}));
  const addSet=exId=>setSess(p=>({...p,exercises:p.exercises.map(ex=>{
    if(ex.id!==exId)return ex;
    const L=ex.sets[ex.sets.length-1];
    return{...ex,sets:[...ex.sets,{id:`s${Date.now()}`,kg:L.kg,reps:L.reps,done:false}]};
  })}));
  return(
    <div className="sc" style={{padding:'0 20px 24px'}}>
      <div className="sesh">
        <div>
          <div style={{fontFamily:'var(--fh)',fontSize:19,fontWeight:700,color:'var(--text)'}}>{sess.name}</div>
          <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:600,color:'var(--brand2)',marginTop:3,fontVariantNumeric:'tabular-nums'}}>⏱ {fmt(elapsed)}</div>
        </div>
        <button className="finish" onClick={onFinish}>Finish</button>
      </div>
      <div style={{height:16}}/>
      {/* 6. Rest banner with pulse */}
      {restOn&&(
        <div className={`rb rb-on`}>
          <div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--t2)',marginBottom:5}}>Rest</div>
            <div className="rc">{fmt(rest)}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <button className="gh" style={{height:34,fontSize:12}} onClick={()=>setRest(r=>r+15)}>+15s</button>
            <button className="gh" style={{height:34,fontSize:12}} onClick={()=>setRestOn(false)}>Stop</button>
          </div>
        </div>
      )}
      {sess.exercises.map(ex=>{
        const done=ex.sets.filter(s=>s.done).length;
        const total=ex.sets.length;
        const pct=(done/total)*100;
        return(
          <div key={ex.id} className="ec">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <div className="en">{ex.name}</div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:5}}>
                  <div style={{fontSize:12,color:done===total&&total>0?'var(--ok)':'var(--t2)',fontWeight:600}}>
                    {done} / {total} sets
                  </div>
                  {done===total&&total>0&&<span className="chip chipok" style={{height:18,fontSize:9,padding:'0 6px'}}>Done</span>}
                </div>
                {/* 2. Progress bar */}
                <div style={{width:100,height:2,borderRadius:1,background:'var(--s3)',marginTop:7}}>
                  <div style={{height:'100%',width:`${pct}%`,background:done===total?'var(--ok)':'var(--brand)',borderRadius:1,transition:'width .3s ease'}}/>
                </div>
              </div>
              <button className="gh" style={{height:30,fontSize:13,padding:'0 10px',flexShrink:0}}>⋯</button>
            </div>
            <div className="sw">
              <div className="shd"><span>Set</span><span>kg</span><span>Reps</span><span>✓</span></div>
              {ex.sets.map((s,i)=>(
                <div key={s.id} className={`sr${s.done?' done':''}`}>
                  <div className="sn">{i+1}</div>
                  <input className="si" type="text" inputMode="decimal" value={s.kg} onChange={e=>upd(ex.id,s.id,'kg',e.target.value)}/>
                  <input className="si" type="text" inputMode="numeric" value={s.reps} onChange={e=>upd(ex.id,s.id,'reps',e.target.value)}/>
                  <div className="ck" onClick={()=>toggle(ex.id,s.id)}>{s.done?'✓':''}</div>
                </div>
              ))}
            </div>
            <button className="gh" style={{width:'100%',marginTop:12,height:40,fontSize:13}} onClick={()=>addSet(ex.id)}>+ Add Set</button>
          </div>
        );
      })}
      <button className="gh" style={{width:'100%',height:50,fontSize:14,marginTop:4}}>+ Add Exercise</button>
    </div>
  );
}

/* ── 5. CHART with tap callout ── */
function Chart({data,labels,color,gid}){
  color=color||'#4f66ff';
  gid=gid||'cg';
  const [tip,setTip]=useState(null);
  const W=310,H=130,p={t:22,b:24,l:4,r:4};
  const mn=Math.min(...data)-3,mx=Math.max(...data)+3;
  const xi=i=>p.l+(i/(data.length-1))*(W-p.l-p.r);
  const yi=v=>p.t+((mx-v)/(mx-mn))*(H-p.t-p.b);
  const pts=data.map((v,i)=>[xi(i),yi(v)]);
  let d=`M ${pts[0]}`;
  for(let i=1;i<pts.length;i++){const cx=(pts[i][0]+pts[i-1][0])/2;d+=` C ${cx} ${pts[i-1][1]},${cx} ${pts[i][1]},${pts[i][0]} ${pts[i][1]}`;}
  const fill=d+` L ${pts[pts.length-1][0]} ${H-p.b} L ${pts[0][0]} ${H-p.b} Z`;
  const lp=pts[pts.length-1];
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',overflow:'visible'}} onClick={()=>setTip(null)}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[.33,.66].map((t,i)=>(
        <line key={i} x1={p.l} y1={p.t+t*(H-p.t-p.b)} x2={W-p.r} y2={p.t+t*(H-p.t-p.b)} stroke="rgba(255,255,255,.05)" strokeWidth="1" strokeDasharray="3,4"/>
      ))}
      <path d={fill} fill={`url(#${gid})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {[0,3,6,9,11].filter(idx=>idx<labels.length).map(idx=>(
        <text key={idx} x={xi(idx)} y={H-2} fontSize="10" fill="rgba(154,170,200,.9)" textAnchor="middle" fontFamily="Inter,sans-serif">{labels[idx].split(' ')[0]}</text>
      ))}
      {/* hit targets */}
      {pts.map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r="13" fill="transparent" style={{cursor:'pointer'}}
          onClick={e=>{e.stopPropagation();setTip(tip&&tip.i===i?null:{i,x,y,v:data[i],l:labels[i]});}}/>
      ))}
      {/* highlighted point */}
      {tip?(
        <>
          <circle cx={tip.x} cy={tip.y} r="14" fill={color} fillOpacity=".12"/>
          <circle cx={tip.x} cy={tip.y} r="5" fill={color}/>
        </>
      ):(
        <>
          <circle cx={lp[0]} cy={lp[1]} r="5" fill={color}/>
          <circle cx={lp[0]} cy={lp[1]} r="9" fill={color} fillOpacity=".15"/>
          <text x={lp[0]} y={lp[1]-13} fontSize="12" fontWeight="700" fill={color} textAnchor="middle" fontFamily="Space Grotesk,sans-serif">{data[data.length-1]}</text>
        </>
      )}
      {/* callout */}
      {tip&&(()=>{
        const cx=Math.min(Math.max(tip.x,46),W-46);
        const ry=tip.y-50;
        return(
          <g pointerEvents="none">
            <line x1={cx} y1={ry+30} x2={tip.x} y2={tip.y-7} stroke={color} strokeWidth="1" strokeOpacity=".35" strokeDasharray="2,3"/>
            <rect x={cx-42} y={ry} width={84} height={30} rx={8} fill="#0c1030" stroke={color} strokeWidth="1" strokeOpacity=".5"/>
            <text x={cx} y={ry+13} fontSize="12" fontWeight="800" fill={color} textAnchor="middle" fontFamily="Space Grotesk,sans-serif">{tip.v} kg</text>
            <text x={cx} y={ry+24} fontSize="9" fill="rgba(154,170,200,.9)" textAnchor="middle" fontFamily="Inter,sans-serif">{tip.l}</text>
          </g>
        );
      })()}
    </svg>
  );
}

/* ── APP ── */
const ACCENT_MAP={
  '#4f66ff':{r:79,g:102,b:255,b2:'#7c8cff'},
  '#8b5cf6':{r:139,g:92,b:246,b2:'#a78bfa'},
  '#0ea5e9':{r:14,g:165,b:233,b2:'#38bdf8'},
};
const TDEFS=/*EDITMODE-BEGIN*/{
  "accent": "#4f66ff"
}/*EDITMODE-END*/;

function App(){
  const [t,setTweak]=useTweaks(TDEFS);
  const [view,setView]=useState('workouts');
  const [inSess,setInSess]=useState(false);
  const [sheet,setSheet]=useState(null);
  const [dir,setDir]=useState(0);
  const [exLib,setExLib]=useState(EXLIB);
  const [exSheet,setExSheet]=useState(null);
  const [muscleLib,setMuscleLib]=useState(ALL_MUSCLES);
  const [bodyLogOpen,setBodyLogOpen]=useState(false);

  useEffect(()=>{
    const hex=t.accent;
    const m=ACCENT_MAP[hex]||ACCENT_MAP['#4f66ff'];
    const root=document.documentElement;
    root.style.setProperty('--brand',hex);
    root.style.setProperty('--brgb',`${m.r},${m.g},${m.b}`);
    root.style.setProperty('--brand2',m.b2);
    root.style.setProperty('--bsoft',`rgba(${m.r},${m.g},${m.b},.1)`);
    root.style.setProperty('--bbd',`rgba(${m.r},${m.g},${m.b},.22)`);
  },[t.accent]);

  const goTo=(v)=>{
    const cur=inSess?5:(NAV_ORDER[view]??2);
    const nxt=NAV_ORDER[v]??2;
    setDir(nxt>cur?1:-1);
    setInSess(false);
    setSheet(null);
    setView(v);
  };
  const startSess=(tmpl)=>{
    if(tmpl){setSheet(tmpl);}
    else{setDir(0);setInSess(true);setSheet(null);}
  };
  const confirmSess=()=>{setDir(0);setSheet(null);setInSess(true);};
  const finishSess=()=>{setDir(-1);setInSess(false);};

  const openExEdit=ex=>setExSheet({item:ex});
  const openExAdd=()=>setExSheet({item:null});
  const saveExercise=ex=>{setExLib(p=>{const found=p.find(e=>e.id===ex.id);return found?p.map(e=>e.id===ex.id?ex:e):[...p,ex];});setExSheet(null);};
  const deleteExercise=id=>{setExLib(p=>p.filter(e=>e.id!==id));setExSheet(null);};
  const removeExercise=id=>setExLib(p=>p.filter(e=>e.id!==id));
  const animCls=dir===0?'tu':dir>0?'tr':'tl';
  const vk=inSess?'sess':view;

  const renderV=()=>{
    if(inSess)return <SessionView onFinish={finishSess}/>;
    switch(view){
      case 'stats':return <StatsView onBodyLog={()=>setBodyLogOpen(true)}/>;
      case 'history':return <HistoryView/>;
      case 'exercises':return <ExercisesView lib={exLib} onEdit={openExEdit} onAdd={openExAdd} onRemove={removeExercise}/>;
      case 'tools':return <ToolsView/>;
      default:return <WorkoutsView onStart={startSess}/>;
    }
  };

  return(
    <div className="app-shell">
      <div className="app-col">
        <div key={vk} className={animCls} style={{flex:1,overflow:'hidden',minHeight:0,position:'relative',display:'flex',flexDirection:'column'}}>
          {renderV()}
        </div>
        {!inSess&&(
          <div style={{flexShrink:0,padding:'8px 14px',paddingBottom:'calc(8px + env(safe-area-inset-bottom, 0px))',position:'relative',zIndex:2}}>
            <Nav active={view} set={goTo}/>
          </div>
        )}
        {inSess&&<div style={{height:'env(safe-area-inset-bottom, 0px)'}}/>}
        {sheet&&<TemplateSheet tmpl={sheet} onStart={confirmSess} onClose={()=>setSheet(null)}/>}
        {exSheet!==null&&<ExerciseSheet item={exSheet.item} onSave={saveExercise} onDelete={deleteExercise} onClose={()=>setExSheet(null)} muscleLib={muscleLib} setMuscleLib={setMuscleLib}/>}
        {bodyLogOpen&&<BodyLogSheet onClose={()=>setBodyLogOpen(false)} onSave={()=>setBodyLogOpen(false)}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
