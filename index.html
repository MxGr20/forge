<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#020510">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
body{background:var(--bg)}
:root{
  --bg:#07091b;--s1:#0c1230;--s2:#101840;--s3:#141f50;
  --bd:rgba(255,255,255,.055);--bd2:rgba(255,255,255,.1);
  --text:#edf2fc;--t2:#adb9d4;--t3:#8090b0;
  --brand:#4f66ff;--brgb:79,102,255;--brand2:#7c8cff;
  --bsoft:rgba(79,102,255,.1);--bbd:rgba(79,102,255,.22);
  --ok:#22c55e;--okrgb:34,197,94;--oksoft:rgba(34,197,94,.08);--okbd:rgba(34,197,94,.25);
  --warn:#f59e0b;--danger:#ef4444;
  --fh:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
  --max:480px;
}
#root{display:flex;flex-direction:column}
.app-shell{
  position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0,rgba(var(--brgb),.07) 0%,transparent 55%),var(--bg);
}
@media(min-width:600px){
  .app-shell{align-items:center}
  .app-col{width:var(--max);height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}
}
.app-col{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;width:100%}
.sc{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sc::-webkit-scrollbar{display:none}
@keyframes sR{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes sL{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes sU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.tr{animation:sR .26s cubic-bezier(.22,1,.36,1)}
.tl{animation:sL .26s cubic-bezier(.22,1,.36,1)}
.tu{animation:sU .22s cubic-bezier(.22,1,.36,1)}
@keyframes shup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet{
  position:fixed;bottom:0;left:0;right:0;border-radius:24px 24px 0 0;
  background:#0d1438;border-top:1px solid rgba(255,255,255,.13);
  z-index:200;animation:shup .32s cubic-bezier(.22,1,.36,1);
}
@media(min-width:600px){
  .sheet{left:50%;right:auto;width:var(--max);margin-left:calc(var(--max)/ -2)}
}
.sheet-scrim{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:199}
@keyframes rpulse{
  0%,100%{box-shadow:0 0 0 0 rgba(var(--brgb),0)}
  50%{box-shadow:0 0 0 8px rgba(var(--brgb),.13),0 0 18px rgba(var(--brgb),.07)}
}
.rb-on{animation:rpulse 2.4s ease-in-out infinite}
.nav{
  height:58px;background:rgba(7,11,32,.92);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,.08);border-radius:30px;
  display:flex;align-items:center;overflow:hidden
}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:transparent;border:none;cursor:pointer;padding:8px 0 6px;color:var(--t3);font-family:var(--fb);transition:color .18s}
.nb.on{color:var(--brand2)}
.nb svg{display:block}
.nlbl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.npill{height:3px;border-radius:1.5px;background:var(--brand);margin-top:3px;transition:width .22s cubic-bezier(.22,1,.36,1),opacity .22s}
.cta{width:100%;height:54px;border-radius:27px;
  background:linear-gradient(135deg,#2d3b8d 0%,var(--brand) 55%,var(--brand2) 100%);
  color:#fff;font-family:var(--fh);font-size:16px;font-weight:700;border:none;cursor:pointer;
  box-shadow:0 8px 28px rgba(var(--brgb),.32);transition:transform .12s,box-shadow .12s;
  display:flex;align-items:center;justify-content:center;letter-spacing:.01em}
.cta:active{transform:scale(.97);box-shadow:0 4px 14px rgba(var(--brgb),.2)}
.gh{height:38px;padding:0 14px;border-radius:19px;background:rgba(255,255,255,.05);
  border:1px solid var(--bd2);color:var(--t2);font-family:var(--fb);font-size:12px;font-weight:600;
  cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;
  justify-content:center;white-space:nowrap}
.gh:active{background:var(--s2);color:var(--text)}
.finish{height:38px;padding:0 18px;border-radius:19px;background:var(--ok);color:#022b14;
  font-family:var(--fh);font-size:13px;font-weight:700;border:none;cursor:pointer;flex-shrink:0}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:18px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}
.pg-eye{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.pg-h{font-family:var(--fh);font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.st{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:14px}
.sl2{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.sv{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
.sv span{font-size:12px;color:var(--t2);margin-left:2px;font-weight:600}
.sw{display:grid;gap:7px;margin-top:14px}
.shd{display:grid;grid-template-columns:38px 1fr 1fr 44px;gap:8px;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--t2);padding:0 2px 2px;text-align:center}
.sr{display:grid;grid-template-columns:38px 1fr 1fr 44px;gap:8px;align-items:center}
.sn{width:38px;height:44px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;
  font-weight:700;color:var(--t2);transition:background .2s,border-color .2s,color .2s}
.si{height:44px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);color:var(--text);
  font-family:var(--fh);font-size:18px;font-weight:700;text-align:center;width:100%;
  font-variant-numeric:tabular-nums;transition:background .2s,border-color .2s}
.si:focus{outline:none;border-color:var(--brand);background:rgba(var(--brgb),.08)}
.ck{width:44px;height:44px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;
  color:transparent;transition:background .2s,border-color .2s,color .2s}
.sr.done .sn{background:var(--oksoft);border-color:var(--okbd);color:var(--ok)}
.sr.done .si{background:var(--oksoft);border-color:var(--okbd);color:var(--ok)}
.sr.done .ck{background:var(--ok);border-color:var(--ok);color:#022b14}
.chip{display:inline-flex;align-items:center;padding:0 9px;height:22px;border-radius:11px;
  font-size:11px;font-weight:700;letter-spacing:.03em;background:var(--bsoft);border:1px solid var(--bbd);color:var(--brand2)}
.chipok{background:var(--oksoft);border:1px solid var(--okbd);color:var(--ok)}
.hi{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--bd);gap:12px;cursor:pointer}
.hi:last-child{border-bottom:none}
.hd{width:7px;height:7px;border-radius:50%;background:var(--brand);flex-shrink:0}
.hd.meas{background:var(--t3)}
.er{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bd)}
.er:last-child{border-bottom:none}
.setr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bd)}
.setr:last-child{border-bottom:none}
.seti{width:80px;height:38px;border-radius:10px;background:var(--s2);border:1px solid var(--bd);
  color:var(--text);font-family:var(--fh);font-size:15px;font-weight:700;text-align:center}
.seti:focus{outline:none;border-color:var(--brand)}
.div{height:1px;background:var(--bd);margin:22px 0}
.sesh{position:sticky;top:0;background:var(--bg);z-index:10;padding:14px 20px 12px;
  margin:0 -20px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.rb{background:linear-gradient(135deg,rgba(10,16,52,.95),rgba(14,22,60,.95));
  border:1px solid var(--bbd);border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rc{font-family:var(--fh);font-size:36px;font-weight:800;color:var(--brand2);
  font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}
.ec{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:16px;margin-bottom:10px}
.en{font-family:var(--fh);font-size:17px;font-weight:700;color:var(--brand2)}
.cw{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:16px}
.empty{display:flex;flex-direction:column;align-items:center;padding:40px 24px;text-align:center;gap:10px}
/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(20,28,60,.96);border:1px solid rgba(255,255,255,.12);border-radius:20px;
  padding:10px 20px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;
  pointer-events:none;z-index:200;transition:opacity .3s}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useReducer, useRef } = React;
const { useTweaks, TweaksPanel, TweakSection, TweakColor } = window;

const NAV_ORDER = { stats:0, history:1, workouts:2, exercises:3, tools:4 };
const EX_METRICS = [
  {key:'heaviestWeight',lbl:'Weight',unit:'kg'},
  {key:'bestSessionVolume',lbl:'Volume',unit:'kg'},
  {key:'oneRmBrzycki',lbl:'1RM',unit:'kg'},
  {key:'mostReps',lbl:'Reps',unit:'reps'},
];
const RANGES = [{l:'4w',n:4},{l:'8w',n:8},{l:'12w',n:12},{l:'All',n:999}];

/* ── helpers ── */
function fmtDur(secs){
  const m=Math.floor(secs/60),s=secs%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtMins(secs){
  const m=Math.round(secs/60);
  return m>0?`${m} min`:'—';
}
function getWeekStart(){
  const d=new Date(); const dow=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-((dow+6)%7)); mon.setHours(0,0,0,0);
  return mon;
}
function fmt8(dt){
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

/* ── nav icons ── */
const NIco = {
  stats:<svg width="20" height="18" viewBox="0 0 20 18" fill="currentColor"><rect x="1" y="10" width="4" height="8" rx="1.5"/><rect x="8" y="5" width="4" height="13" rx="1.5"/><rect x="15" y="1" width="4" height="17" rx="1.5"/></svg>,
  hist:<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="10" cy="10" r="8"/><path d="M10 6v4l3 3"/></svg>,
  work:<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"><path d="M10 2L18 6.5v7L10 18L2 13.5v-7Z"/></svg>,
  lib:<svg width="20" height="16" viewBox="0 0 20 16" fill="currentColor"><rect y="0" width="20" height="2" rx="1"/><rect y="7" width="20" height="2" rx="1"/><rect y="14" width="13" height="2" rx="1"/></svg>,
  tools:<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="10" cy="10" r="2.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.3 4.3l1.4 1.4M14.3 14.3l1.4 1.4M14.3 4.3l-1.4 1.4M4.3 15.7l1.4-1.4"/></svg>,
};

function SheetPortal({children}){
  return ReactDOM.createPortal(children, document.body);
}

function Nav({active,set}){
  const items=[{id:'stats',lbl:'Stats',ico:NIco.stats},{id:'history',lbl:'History',ico:NIco.hist},{id:'workouts',lbl:'Forge',ico:NIco.work},{id:'exercises',lbl:'Library',ico:NIco.lib},{id:'tools',lbl:'Tools',ico:NIco.tools}];
  return(
    <div className="nav">
      {items.map(it=>(
        <button key={it.id} className={`nb${active===it.id?' on':''}`} onClick={()=>set(it.id)}>
          {it.ico}
          <span className="nlbl">{it.lbl}</span>
          <div className="npill" style={{width:active===it.id?14:0,opacity:active===it.id?1:0}}/>
        </button>
      ))}
    </div>
  );
}

/* ── WOD CARD ── */
const WOD_TYPE={
  'Rest':             {color:'var(--t3)',    bg:'rgba(255,255,255,.04)', bd:'rgba(255,255,255,.08)'},
  'Strength+Mobility':{color:'var(--brand2)',bg:'rgba(79,102,255,.1)',   bd:'rgba(79,102,255,.22)'},
  'Strength':         {color:'var(--brand2)',bg:'rgba(79,102,255,.1)',   bd:'rgba(79,102,255,.22)'},
  'Padel':            {color:'#f59e0b',      bg:'rgba(245,158,11,.09)',  bd:'rgba(245,158,11,.2)'},
  'Run':              {color:'var(--ok)',    bg:'rgba(34,197,94,.08)',   bd:'rgba(34,197,94,.25)'},
  'Bike':             {color:'#60a5fa',      bg:'rgba(96,165,250,.08)',  bd:'rgba(96,165,250,.2)'},
  'Swim':             {color:'#22d3ee',      bg:'rgba(34,211,238,.08)',  bd:'rgba(34,211,238,.2)'},
};
const INTENSITY_STYLE={
  'Rest':    {color:'var(--t3)',    dots:0},
  'Low':     {color:'var(--ok)',    dots:1},
  'Easy':    {color:'var(--ok)',    dots:1},
  'Moderate':{color:'var(--warn)',  dots:2},
  'Hard':    {color:'var(--danger)',dots:3},
  'High':    {color:'var(--danger)',dots:3},
};
function WodCard({wod,onTap}){
  if(!wod){
    return(
      <div style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:20,padding:'18px',marginBottom:20}}>
        <div style={{fontSize:13,color:'var(--t3)',textAlign:'center',padding:'8px 0'}}>No session scheduled today.</div>
      </div>
    );
  }
  const ts=WOD_TYPE[wod.sessionType]||WOD_TYPE['Rest'];
  const inS=INTENSITY_STYLE[wod.intensity]||{color:'var(--t2)',dots:1};
  const dots=[1,2,3];
  return(
    <div onClick={onTap} style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:20,padding:'18px',marginBottom:20,position:'relative',overflow:'hidden',cursor:onTap?'pointer':'default'}}>
      <div style={{position:'absolute',top:0,right:0,width:160,height:100,background:'radial-gradient(ellipse at 100% 0%, '+ts.bg+' 0%, transparent 70%)',pointerEvents:'none'}}/>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'var(--t2)',background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:6,padding:'3px 8px'}}>WK {wod.week} · {(wod.phase||'').toUpperCase()}</span>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',background:ts.bg,border:'1px solid '+ts.bd,color:ts.color,borderRadius:6,padding:'3px 8px'}}>{wod.sessionType}</span>
        {wod.keySession&&<span style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'var(--warn)',background:'rgba(251,191,36,.1)',border:'1px solid rgba(251,191,36,.25)',borderRadius:6,padding:'3px 8px'}}>KEY SESSION</span>}
      </div>
      <div style={{fontFamily:'var(--fh)',fontSize:19,fontWeight:800,color:'var(--text)',marginBottom:14,lineHeight:1.2}}>{wod.session}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:wod.notes?14:0}}>
        <div style={{background:'var(--s2)',borderRadius:12,padding:'10px 12px'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'var(--t3)',marginBottom:4}}>DISTANCE</div>
          <div style={{fontFamily:'var(--fh)',fontSize:18,fontWeight:800,color:'var(--text)',lineHeight:1}}>{wod.distanceKm!=null?wod.distanceKm:<span style={{color:'var(--t3)'}}>—</span>}{wod.distanceKm!=null&&<span style={{fontSize:11,color:'var(--t2)',marginLeft:2}}>km</span>}</div>
        </div>
        <div style={{background:'var(--s2)',borderRadius:12,padding:'10px 12px'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'var(--t3)',marginBottom:4}}>DURATION</div>
          <div style={{fontFamily:'var(--fh)',fontSize:15,fontWeight:800,color:'var(--text)',lineHeight:1.1}}>
            {wod.durationMin!=null?(wod.durationMax!=null&&wod.durationMax!==wod.durationMin?`${wod.durationMin}–${wod.durationMax}`:wod.durationMin):<span style={{color:'var(--t3)'}}>—</span>}
            {wod.durationMin!=null&&<span style={{fontSize:10,color:'var(--t2)',marginLeft:2}}>min</span>}
          </div>
        </div>
        <div style={{background:'var(--s2)',borderRadius:12,padding:'10px 12px'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'var(--t3)',marginBottom:4}}>INTENSITY</div>
          <div style={{fontSize:11,fontWeight:700,color:inS.color,marginBottom:5}}>{wod.intensity||'—'}</div>
          <div style={{display:'flex',gap:3}}>{dots.map(d=><div key={d} style={{width:6,height:6,borderRadius:'50%',background:d<=inS.dots?inS.color:'var(--s3)'}}/>)}</div>
        </div>
      </div>
      {wod.notes&&(
        <div style={{borderTop:'1px solid var(--bd)',paddingTop:12,display:'flex',gap:8,alignItems:'flex-start'}}>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style={{flexShrink:0,marginTop:1}}>
            <rect x="2" y="1" width="12" height="14" rx="2" stroke="var(--t3)" strokeWidth="1.5"/>
            <line x1="5" y1="5" x2="11" y2="5" stroke="var(--t3)" strokeWidth="1.2"/>
            <line x1="5" y1="8" x2="11" y2="8" stroke="var(--t3)" strokeWidth="1.2"/>
            <line x1="5" y1="11" x2="9" y2="11" stroke="var(--t3)" strokeWidth="1.2"/>
          </svg>
          <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.5,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{wod.notes}</div>
        </div>
      )}
    </div>
  );
}

function MuscleLoadRollup(){
  const rollup=getWeeklyMuscleRollup();
  if(!rollup.length)return null;
  return(
    <div style={{marginBottom:18}}>
      <div className="sh" style={{marginBottom:8}}><span className="sl">Muscles This Week</span></div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {rollup.map(({muscle,sets})=>(
          <div key={muscle} className="chip" style={{fontSize:11,padding:'4px 10px'}}>
            {muscle} <span style={{opacity:.6,marginLeft:3}}>{sets}s</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── WORKOUTS VIEW ── */
function WorkoutsView({onStart,refresh}){
  const fileInputRef=useRef(null);
  const d=new Date();
  const day=d.toLocaleDateString('en-US',{weekday:'long'});
  const date=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const dow=d.getDay();
  const monday=new Date(d); monday.setDate(d.getDate()-((dow+6)%7));
  const weekDays=Array.from({length:7},(_,i)=>{const dd=new Date(monday);dd.setDate(monday.getDate()+i);return dd;});
  const today8=fmt8(new Date());
  const DLBL=['M','T','W','T','F','S','S'];
  const [templateSheet,setTemplateSheet]=useState(null);
  const [editSheet,setEditSheet]=useState(null);
  const [heatmapSheet,setHeatmapSheet]=useState(false);
  const [,tick]=useReducer(x=>x+1,0);

  const weekStart=getWeekStart();
  const doneWorkouts=state.workouts.filter(w=>w.endedAt&&new Date(w.createdAt)>=weekStart&&w.id!==state.activeWorkoutId);
  const doneDays=new Set(doneWorkouts.map(w=>fmt8(new Date(w.createdAt))));
  let weekVol=0,weekSets=0;
  doneWorkouts.forEach(w=>{weekVol+=workoutVolume(w);weekSets+=w.items.reduce((a,i)=>a+i.sets.length,0);});

  const [wods,setWods]=useState(null);
  useEffect(()=>{
    fetch('./data/wod.json').then(r=>r.json()).then(data=>setWods(data)).catch(()=>setWods('error'));
  },[]);
  const wodError=wods==='error';
  const todayWod=Array.isArray(wods)?wods.find(w=>w.date===today8)||null:undefined;
  const handleWodTap=todayWod?(()=>{
    const rn=todayWod.routineName;
    const matched=rn?state.routines.find(r=>r.name.toLowerCase()===rn.toLowerCase()):null;
    onStart(matched||null);
  }):null;

  const streak=(()=>{
    const completed=state.workouts.filter(w=>w.endedAt&&w.id!==state.activeWorkoutId).map(w=>fmt8(new Date(w.createdAt)));
    const daySet=new Set(completed);
    let wk=0;
    let cur=new Date(); cur.setHours(0,0,0,0);
    cur.setDate(cur.getDate()-((cur.getDay()+6)%7));
    while(true){
      let hasWk=false;
      for(let d=0;d<7;d++){const dd=new Date(cur);dd.setDate(cur.getDate()+d);if(daySet.has(fmt8(dd))){hasWk=true;break;}}
      if(!hasWk)break;
      wk++; cur.setDate(cur.getDate()-7);
    }
    return wk;
  })();

  const routines=state.routines;

  return(
    <div className="sc" style={{padding:'16px 20px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
        <div>
          <div className="pg-eye">{date}</div>
          <div style={{fontFamily:'var(--fh)',fontSize:34,fontWeight:800,color:'var(--text)',letterSpacing:'-.02em',lineHeight:1.1}}>{day}</div>
        </div>
        <div style={{fontFamily:'var(--fh)',fontSize:16,fontWeight:800,letterSpacing:'.1em',color:'var(--text)',paddingTop:6}}>FORGE</div>
      </div>

      <div onClick={()=>setHeatmapSheet(true)} style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:16,padding:'13px 16px',marginBottom:20,display:'flex',alignItems:'center',cursor:'pointer'}}>
        <div style={{flex:1,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
          {weekDays.map((wd,i)=>{
            const ds=fmt8(wd);
            const isDone=doneDays.has(ds);
            const isToday=ds===today8;
            return(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:7}}>
                <span style={{fontSize:10,fontWeight:700,letterSpacing:'.06em',color:isToday?'var(--brand2)':isDone?'var(--t2)':'var(--t3)'}}>{DLBL[i]}</span>
                <div style={{width:isToday?10:8,height:isToday?10:8,borderRadius:'50%',
                  background:isDone?(isToday?'var(--brand)':'var(--ok)'):'var(--s3)',
                  border:isToday?'1.5px solid var(--brand2)':'none',
                  boxShadow:isToday?'0 0 8px rgba(var(--brgb),.6)':isDone&&!isToday?'0 0 5px rgba(var(--okrgb),.35)':'none'}}/>
              </div>
            );
          })}
        </div>
        <div style={{width:1,height:30,background:'var(--bd)',margin:'0 14px'}}/>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'baseline',gap:3}}>
            <div style={{fontFamily:'var(--fh)',fontSize:22,fontWeight:800,color:'var(--text)',lineHeight:1}}>{streak}</div>
            <div style={{fontFamily:'var(--fh)',fontSize:11,fontWeight:700,color:'var(--t2)',lineHeight:1}}>wk</div>
          </div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'var(--ok)',marginTop:3}}>STREAK</div>
        </div>
      </div>

      <button className="cta" style={{marginBottom:22}} onClick={()=>onStart(null)}>Start Workout</button>

      <div className="sh"><span className="sl">Today's Session</span></div>
      {wods===null
        ? <div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{fontSize:12,color:'var(--t3)'}}>Loading…</div></div>
        : wodError
          ? <div style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:20,padding:'18px',marginBottom:20,textAlign:'center'}}><div style={{fontSize:12,color:'var(--t3)'}}>Couldn't load today's plan — check your connection.</div></div>
          : <WodCard wod={todayWod} onTap={handleWodTap}/>
      }

      <div className="sh"><span className="sl">This Week</span></div>
      <div className="sg" style={{marginBottom:22}}>
        <div className="st"><div className="sl2">Volume</div><div className="sv">{Math.round(weekVol).toLocaleString()}<span>kg</span></div></div>
        <div className="st"><div className="sl2">Workouts</div><div className="sv">{doneWorkouts.length}</div></div>
        <div className="st"><div className="sl2">Sets</div><div className="sv">{weekSets}</div></div>
        <div className="st"><div className="sl2">Best Day</div><div className="sv" style={{fontSize:16,letterSpacing:'-.01em'}}>{doneWorkouts.length>0?doneWorkouts.reduce((b,w)=>workoutVolume(w)>workoutVolume(b)?w:b).name.split(' ').slice(0,2).join(' '):'—'}</div></div>
      </div>

      <MuscleLoadRollup/>

      <div className="div"/>
      <div className="sh">
        <span className="sl">Templates</span>
        <button className="gh" style={{height:30,fontSize:11,padding:'0 10px'}} onClick={()=>{
          const name=prompt('Template name');
          if(name){createRoutine(name);refresh();tick();}
        }}>+ New</button>
      </div>
      {routines.length===0?(
        <div className="empty" style={{padding:'24px 0'}}>
          <div style={{fontSize:13,color:'var(--t3)'}}>No templates yet. Create one to get started.</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {routines.map(r=>{
            const exercises=r.items.map(i=>getExercise(i.exerciseId)?.name||'').filter(Boolean);
            const last=state.workouts.filter(w=>w.routineId===r.id&&w.endedAt).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
            const lastStr=last?`${Math.round((Date.now()-new Date(last.createdAt).getTime())/86400000)}d ago`:'Never';
            return(
              <div key={r.id} style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:18,padding:'16px 18px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',marginBottom:10}}
                  onClick={()=>setTemplateSheet(r)}>
                  <div>
                    <div style={{fontFamily:'var(--fh)',fontSize:16,fontWeight:700,color:'var(--text)',marginBottom:4}}>{r.name}</div>
                    <div style={{fontSize:12,color:'var(--t2)'}}>{exercises.length} exercise{exercises.length!==1?'s':''} · Last {lastStr}</div>
                  </div>
                  <span style={{color:'var(--brand2)',fontSize:20,lineHeight:1}}>›</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="cta" style={{height:36,fontSize:13,flex:1,borderRadius:18}} onClick={()=>onStart(r)}>Start</button>
                  <button className="gh" style={{height:36,fontSize:12,padding:'0 14px'}} onClick={()=>setEditSheet(r)}>Edit</button>
                  <button className="gh" style={{height:36,fontSize:12,padding:'0 14px',color:'var(--danger)',borderColor:'rgba(239,68,68,.3)'}}
                    onClick={()=>{if(confirm(`Delete "${r.name}"?`)){deleteRoutine(r.id);tick();refresh();}}}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {templateSheet&&<TemplateSheet routine={templateSheet} onStart={()=>{setTemplateSheet(null);onStart(templateSheet);}} onClose={()=>setTemplateSheet(null)}/>}
      {editSheet&&<TemplateEditSheet routine={editSheet} onClose={()=>{setEditSheet(null);tick();refresh();}}/>}
      {heatmapSheet&&(
        <SheetPortal>
          <div className="sheet-scrim" onClick={()=>setHeatmapSheet(false)}/>
          <div className="sheet" style={{maxHeight:'92%',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'18px 22px 12px',flexShrink:0}}>
              <div style={{width:36,height:4,borderRadius:2,background:'var(--bd2)',margin:'0 auto 14px'}}/>
              <div style={{fontFamily:'var(--fh)',fontSize:23,fontWeight:800,color:'var(--text)'}}>Consistency</div>
            </div>
            <div style={{overflowY:'auto',flex:1,padding:'10px 22px 20px',WebkitOverflowScrolling:'touch',overscrollBehavior:'contain'}}>
              <ConsistencyHeatmap/>
            </div>
          </div>
        </SheetPortal>
      )}
      <input ref={fileInputRef} type="file" accept=".json" style={{display:'none'}}
        onChange={e=>{
          const file=e.target.files[0];
          e.target.value='';
          if(!file)return;
          const reader=new FileReader();
          reader.onload=ev=>{
            let parsed;
            try{parsed=JSON.parse(ev.target.result);}
            catch{toast('Invalid file');return;}
            if(!Array.isArray(parsed)){toast('Invalid file');return;}
            const result=importTemplatesFromJSON(parsed);
            if(result===null){toast('Invalid file');return;}
            const {templatesAdded,exercisesAdded}=result;
            toast(templatesAdded===0&&exercisesAdded===0
              ?'Nothing new to import'
              :`Imported ${templatesAdded} template(s) and ${exercisesAdded} exercise(s)`);
            refresh();
          };
          reader.readAsText(file);
        }}/>
      <button className="gh"
        style={{width:'100%',height:44,fontSize:13,marginTop:16}}
        onClick={()=>fileInputRef.current.click()}>
        ↑ Import Templates
      </button>
    </div>
  );
}

function TemplateEditSheet({routine,onClose}){
  const [name,setName]=useState(routine.name);
  const [addOpen,setAddOpen]=useState(false);
  const [q,setQ]=useState('');
  const [,tick]=useReducer(x=>x+1,0);
  const saveName=()=>{
    if(name.trim()&&name.trim()!==routine.name){renameRoutine(routine.id,name.trim());window._forgeToast?.('Template updated');}
  };
  const doAddEx=(exId)=>{addRoutineExercise(routine.id,exId);tick();setAddOpen(false);setQ('');};
  const doRemoveEx=(itemId)=>{removeRoutineExercise(routine.id,itemId);tick();};
  const doMove=(itemId,delta)=>{moveRoutineItem(routine.id,itemId,delta);tick();};
  const doAddSet=(itemId)=>{addRoutineSet(routine.id,itemId);tick();};
  const doRemoveSet=(itemId,setId)=>{removeRoutineSet(routine.id,itemId,setId);tick();};
  const doUpdSet=(itemId,setId,field,val)=>{updateRoutineSet(routine.id,itemId,setId,field,val);};
  const filtered=state.exercises.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())).slice(0,40);
  const Ico=({children,onClick,style})=>(
    <button onClick={onClick} style={{width:30,height:30,borderRadius:9,background:'var(--s2)',border:'1px solid var(--bd)',color:'var(--t2)',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,...style}}>{children}</button>
  );
  return(
    <SheetPortal>
      <div className="sheet-scrim" onClick={onClose}/>
      <div className="sheet" style={{maxHeight:'92%',display:'flex',flexDirection:'column'}}>
        {/* sticky header */}
        <div style={{padding:'14px 22px 12px',flexShrink:0,borderBottom:'1px solid var(--bd)'}}>
          <div style={{width:36,height:4,borderRadius:2,background:'var(--bd2)',margin:'0 auto 12px'}}/>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--t3)',marginBottom:8}}>Edit Template</div>
          <input value={name} onChange={e=>setName(e.target.value)} onBlur={saveName}
            style={{width:'100%',height:50,borderRadius:14,background:'var(--s2)',border:'1px solid var(--bbd)',color:'var(--text)',
              fontFamily:'var(--fh)',fontSize:17,fontWeight:700,padding:'0 16px',outline:'none'}}/>
        </div>
        {/* scrollable body */}
        <div style={{overflowY:'auto',flex:1,padding:'12px 18px 0',WebkitOverflowScrolling:'touch',overscrollBehavior:'contain'}}>
          {routine.items.length===0&&(
            <div style={{textAlign:'center',padding:'16px 0',color:'var(--t3)',fontSize:13}}>No exercises yet. Add some below.</div>
          )}
          {routine.items.map((item,idx)=>{
            const ex=getExercise(item.exerciseId);
            const isFirst=idx===0, isLast=idx===routine.items.length-1;
            const isSeconds=normalizeItemMetricMode(item)==='seconds';
            return(
              <div key={item.id} className="ec" style={{marginBottom:10}}>
                {/* exercise header row */}
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <div style={{display:'flex',flexDirection:'column',gap:3,flexShrink:0}}>
                    <Ico onClick={()=>!isFirst&&doMove(item.id,-1)} style={{opacity:isFirst?.25:1,height:26,width:26,fontSize:12}}>↑</Ico>
                    <Ico onClick={()=>!isLast&&doMove(item.id,1)} style={{opacity:isLast?.25:1,height:26,width:26,fontSize:12}}>↓</Ico>
                  </div>
                  <div style={{width:20,height:20,borderRadius:6,background:'var(--s2)',border:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fh)',fontSize:10,fontWeight:700,color:'var(--t3)',flexShrink:0}}>{idx+1}</div>
                  <span style={{flex:1,fontSize:14,fontWeight:600,color:'var(--text)'}}>{ex?.name||'Unknown'}</span>
                  <button onClick={()=>{toggleRoutineItemMetricMode(routine.id,item.id);tick();}}
                    style={{height:26,padding:'0 8px',borderRadius:8,background:isSeconds?'var(--bsoft)':'var(--s2)',border:`1px solid ${isSeconds?'var(--bbd)':'var(--bd)'}`,color:isSeconds?'var(--brand2)':'var(--t3)',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
                    {isSeconds?'sec':'reps'}
                  </button>
                  <Ico onClick={()=>doRemoveEx(item.id)} style={{background:'rgba(239,68,68,.1)',borderColor:'rgba(239,68,68,.3)',color:'var(--danger)',fontSize:16}}>−</Ico>
                </div>
                {/* note */}
                <input type="text" defaultValue={item.note||''} placeholder="Add note…"
                  onBlur={e=>updateRoutineItemNote(routine.id,item.id,e.target.value)}
                  style={{width:'100%',height:34,borderRadius:9,background:'var(--s2)',border:'1px solid var(--bd)',color:'var(--t2)',fontSize:12,padding:'0 10px',fontFamily:'inherit',marginBottom:8,outline:'none'}}/>
                {/* sets */}
                {item.sets.length>0&&(
                  <div className="sw">
                    <div className="shd"><span>Set</span><span>kg</span><span>{isSeconds?'sec':'reps'}</span><span></span></div>
                    {item.sets.map((s,si)=>(
                      <div key={s.id} className="sr done">
                        <div className="sn">{si+1}</div>
                        <input className="si" type="number" inputMode="decimal" defaultValue={s.weight??''} placeholder="—"
                          onBlur={e=>doUpdSet(item.id,s.id,'weight',e.target.value)}/>
                        <input className="si" type="number" inputMode={isSeconds?'numeric':'numeric'} defaultValue={s.reps??''} placeholder="—"
                          onBlur={e=>doUpdSet(item.id,s.id,'reps',e.target.value)}/>
                        <button onClick={()=>doRemoveSet(item.id,s.id)} style={{width:44,height:44,borderRadius:12,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',color:'var(--danger)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>−</button>
                      </div>
                    ))}
                  </div>
                )}
                <button className="gh" style={{width:'100%',marginTop:8,height:36,fontSize:13}} onClick={()=>doAddSet(item.id)}>+ Add Set</button>
              </div>
            );
          })}
          {/* add exercise */}
          <button className="gh" style={{width:'100%',height:44,fontSize:14,marginTop:4}} onClick={()=>setAddOpen(v=>!v)}>+ Add Exercise</button>
          {addOpen&&(
            <div style={{marginTop:10}}>
              <input type="search" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search exercises…"
                style={{width:'100%',height:42,borderRadius:12,background:'var(--s2)',border:'1px solid var(--bd)',color:'var(--text)',fontSize:14,padding:'0 14px',fontFamily:'inherit',marginBottom:8,outline:'none'}}/>
              {filtered.map(ex=>(
                <div key={ex.id} style={{padding:'11px 0',borderBottom:'1px solid var(--bd)',cursor:'pointer',fontSize:14,color:'var(--text)'}} onClick={()=>doAddEx(ex.id)}>{ex.name}</div>
              ))}
              {filtered.length===0&&<div style={{fontSize:13,color:'var(--t3)',padding:'12px 0'}}>No exercises found</div>}
            </div>
          )}
          <div style={{height:20}}/>
          <button className="cta" onClick={()=>{saveName();onClose();}}>Done</button>
          <div style={{height:'max(24px, env(safe-area-inset-bottom, 24px))'}}/>
        </div>
      </div>
    </SheetPortal>
  );
}

function SetRow({s,i,itemId,prevSets,updField,onToggle,repsLbl}){
  const [weight,setWeight]=useState(s.weight??'');
  const [reps,setReps]=useState(s.reps??'');
  const prev=prevSets?.[i];
  const hasPrev=prev&&(prev.weight!=null||prev.reps!=null);
  const isWarmup=normalizeSetTag(s.tag)==='warmup';
  const fillPrev=()=>{
    const w=prev.weight??'';const r=prev.reps??'';
    setWeight(w);setReps(r);
    updField(itemId,s.id,'weight',String(w));
    updField(itemId,s.id,'reps',String(r));
  };
  return(
    <div className={`sr${s.completed?' done':''}`} style={isWarmup?{background:'rgba(var(--brgb),.06)',borderRadius:6}:undefined}>
      <div className="sn">{isWarmup?'WU':i+1}</div>
      <div style={{display:'flex',flexDirection:'column',gap:1}}>
        <input className="si" type="number" inputMode="decimal" value={weight} placeholder="—"
          onChange={e=>setWeight(e.target.value)}
          onBlur={e=>updField(itemId,s.id,'weight',e.target.value)}/>
        {hasPrev&&<span onClick={fillPrev} style={{fontSize:9,color:'var(--t3)',textAlign:'center',lineHeight:1,cursor:'pointer'}}>{prev.weight??'—'}</span>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:1}}>
        <input className="si" type="number" inputMode="numeric" value={reps} placeholder="—"
          onChange={e=>setReps(e.target.value)}
          onBlur={e=>updField(itemId,s.id,'reps',e.target.value)}/>
        {hasPrev&&<span onClick={fillPrev} style={{fontSize:9,color:'var(--t3)',textAlign:'center',lineHeight:1,cursor:'pointer'}}>{prev.reps??'—'}</span>}
      </div>
      <div className="ck" onClick={()=>onToggle(itemId,s.id)}>{s.completed?'✓':''}</div>
    </div>
  );
}

/* ── SESSION VIEW ── */
function SessionView({onFinish,onDiscard,rest,restOn,setRest,setRestOn}){
  const workout=getActiveWorkout();
  const [elapsed,setEl]=useState(workout?Math.round((Date.now()-new Date(workout.createdAt).getTime())/1000):0);
  const [,tick]=useReducer(x=>x+1,0);
  const [showWarn,setShowWarn]=useState(false);
  const [showDiscard,setShowDiscard]=useState(false);
  const [dismissed,setDismissed]=useState({});

  useEffect(()=>{
    if(!workout)return;
    const start=new Date(workout.createdAt).getTime();
    const t=setInterval(()=>setEl(Math.round((Date.now()-start)/1000)),1000);
    return()=>clearInterval(t);
  },[]);

  if(!workout)return null;

  const allDone=workout.items.length>0&&workout.items.every(item=>item.sets.length>0&&item.sets.every(s=>s.completed));

  const handleFinish=()=>{
    const hasOpen=workout.items.some(item=>item.sets.some(s=>!s.completed));
    if(hasOpen){setShowWarn(true);}else{onFinish();}
  };

  const toggle=(itemId,setId)=>{
    const item=workout.items.find(i=>i.id===itemId);
    const s=item?.sets.find(s=>s.id===setId);
    if(!s)return;
    s.completed=!s.completed;
    saveState();
    if(s.completed&&state.settings.autoRest){setRest(getRestSeconds(s.tag));setRestOn(true);}
    tick();
  };
  const updField=(itemId,setId,field,val)=>{
    const item=workout.items.find(i=>i.id===itemId);
    const s=item?.sets.find(s=>s.id===setId);
    if(!s)return;
    if(field==='weight'||field==='reps'){const n=parseFloat(val);s[field]=isNaN(n)?null:n;}
    else s[field]=val;
    saveState();
  };
  const doAddSet=(itemId)=>{
    const item=workout.items.find(i=>i.id===itemId);
    if(!item)return;
    const ex=getExercise(item.exerciseId);
    const last=item.sets[item.sets.length-1];
    item.sets.push({id:uid(),type:ex?.type||'weight',tag:'work',completed:false,
      weight:last?.weight??null,reps:last?.reps??null});
    saveState();tick();
  };

  return(
    <div className="sc" style={{padding:'0 20px 24px'}}>
      <div className="sesh">
        <div>
          <div style={{fontFamily:'var(--fh)',fontSize:19,fontWeight:700,color:'var(--text)'}}>{workout.name}</div>
          <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:600,color:'var(--brand2)',marginTop:3,fontVariantNumeric:'tabular-nums'}}>⏱ {fmtDur(elapsed)}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>setShowDiscard(true)} style={{height:36,padding:'0 14px',borderRadius:18,background:'transparent',border:'1px solid rgba(239,68,68,.3)',color:'var(--danger)',fontFamily:'var(--fh)',fontSize:13,fontWeight:700,cursor:'pointer'}}>Discard</button>
          <button className="finish" style={{background:allDone?'var(--ok)':'var(--s2)',color:allDone?'#022b14':'var(--t2)',border:allDone?'none':'1px solid var(--bd)',transition:'all .2s'}} onClick={handleFinish}>Finish</button>
        </div>
      </div>
      {showWarn&&(
        <SheetPortal>
          <div className="sheet-scrim" onClick={()=>setShowWarn(false)}/>
          <div className="sheet" style={{padding:'24px 22px 44px'}}>
            <div style={{width:36,height:4,borderRadius:2,background:'var(--bd2)',margin:'0 auto 18px'}}/>
            <div style={{fontFamily:'var(--fh)',fontSize:19,fontWeight:700,color:'var(--text)',marginBottom:8}}>Incomplete Sets</div>
            <div style={{fontSize:13,color:'var(--t2)',marginBottom:24,lineHeight:1.5}}>
              Some sets haven't been checked off. You can finish anyway or go back to complete them.
            </div>
            <button className="cta" style={{marginBottom:10}} onClick={()=>{setShowWarn(false);onFinish();}}>Finish Anyway</button>
            <button className="gh" style={{width:'100%',height:44}} onClick={()=>setShowWarn(false)}>Continue Workout</button>
          </div>
        </SheetPortal>
      )}
      {showDiscard&&(

            </div>
            {(()=>{const pg=dismissed[item.exerciseId]?null:getProgressionStatus(item.exerciseId);if(!pg)return null;const isSug=pg.type==='suggest';return(

                <span style={{fontSize:12,color:isSug?'var(--brand2)':'var(--danger)',flex:1}}>{isSug?`Try ${pg.weight} kg today (+${getExercise(item.exerciseId)?.progressionIncrement} kg)`:'Consider deloading — recent sessions had failures'}</span>

              </div>

            {prevWeight!=null&&!hasWarmups&&(
              <button className="gh" style={{width:'100%',height:38,fontSize:12,marginBottom:8}}
                onClick={()=>{addWarmupSets(item.id);tick();}}>
                Add Warmups — {Math.round(prevWeight*0.5*2)/2} / {Math.round(prevWeight*0.7*2)/2} / {Math.round(prevWeight*0.85*2)/2} kg
              </button>
            )}
            <input type="text" className="si" placeholder="Note…" defaultValue={item.note||''}
              style={{width:'100%',marginBottom:8,fontSize:12}}
              onBlur={e=>{item.note=e.target.value;saveState();}}/>
            <div className="sw">
              <div className="shd"><span>Set</span><span>kg</span><span>{repsLbl}</span><span>✓</span></div>
              {(()=>{let wi=0;return item.sets.map(s=>{const isWu=normalizeSetTag(s.tag)==='warmup';const idx=isWu?-1:wi++;return(
                <SetRow key={s.id} s={s} i={idx} itemId={item.id} prevSets={isWu?null:prevSets}

              );});})()}
            </div>
            <button className="gh" style={{width:'100%',marginTop:12,height:40,fontSize:13}} onClick={()=>doAddSet(item.id)}>+ Add Set</button>
          </div>

      })}

    </div>
  );
}

/* ── CHART ── */
function Chart({data,labels,color,gid}){
  color=color||'var(--brand)';gid=gid||'cg';
  const [tip,setTip]=useState(null);
  if(!data||data.length<2)return<div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'var(--t3)'}}>Not enough data</div>;
  const W=310,H=130,p={t:22,b:24,l:4,r:4};
  const mn=Math.min(...data)-1,mx=Math.max(...data)+1;
  const xi=i=>p.l+(i/(data.length-1))*(W-p.l-p.r);
  const yi=v=>p.t+((mx-v)/(mx-mn))*(H-p.t-p.b);
  const pts=data.map((v,i)=>[xi(i),yi(v)]);
  let d2=`M ${pts[0]}`;
  for(let i=1;i<pts.length;i++){const cx=(pts[i][0]+pts[i-1][0])/2;d2+=` C ${cx} ${pts[i-1][1]},${cx} ${pts[i][1]},${pts[i][0]} ${pts[i][1]}`;}
  const fill=d2+` L ${pts[pts.length-1][0]} ${H-p.b} L ${pts[0][0]} ${H-p.b} Z`;
  const lp=pts[pts.length-1];
  const showIdxs=[0,Math.floor(data.length/2),data.length-1].filter((v,i,a)=>a.indexOf(v)===i&&v<labels.length);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',overflow:'visible'}} onClick={()=>setTip(null)}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".2"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={fill} fill={`url(#${gid})`}/>
      <path d={d2} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {showIdxs.map(idx=>(
        <text key={idx} x={xi(idx)} y={H-2} fontSize="10" fill="rgba(154,170,200,.9)" textAnchor="middle" fontFamily="Inter,sans-serif">{labels[idx]}</text>
      ))}
      {pts.map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r="12" fill="transparent" style={{cursor:'pointer'}}
          onClick={e=>{e.stopPropagation();setTip(tip?.i===i?null:{i,x,y,v:data[i],l:labels[i]});}}/>
      ))}
      {tip?(<><circle cx={tip.x} cy={tip.y} r="14" fill={color} fillOpacity=".12"/><circle cx={tip.x} cy={tip.y} r="5" fill={color}/></>):(
        <><circle cx={lp[0]} cy={lp[1]} r="5" fill={color}/><circle cx={lp[0]} cy={lp[1]} r="9" fill={color} fillOpacity=".15"/>
        <text x={lp[0]} y={lp[1]-13} fontSize="12" fontWeight="700" fill={color} textAnchor="middle" fontFamily="Space Grotesk,sans-serif">{data[data.length-1]}</text></>
      )}
      {tip&&(()=>{
        const cx=Math.min(Math.max(tip.x,46),W-46);const ry=tip.y-50;
        return(<g pointerEvents="none">
          <line x1={cx} y1={ry+30} x2={tip.x} y2={tip.y-7} stroke={color} strokeWidth="1" strokeOpacity=".35" strokeDasharray="2,3"/>
          <rect x={cx-42} y={ry} width={84} height={30} rx={8} fill="#0c1030" stroke={color} strokeWidth="1" strokeOpacity=".5"/>
          <text x={cx} y={ry+13} fontSize="12" fontWeight="800" fill={color} textAnchor="middle" fontFamily="Space Grotesk,sans-serif">{tip.v}</text>
          <text x={cx} y={ry+24} fontSize="9" fill="rgba(154,170,200,.9)" textAnchor="middle" fontFamily="Inter,sans-serif">{tip.l}</text>
        </g>);
      })()}
    </svg>
  );
}

function ConsistencyHeatmap(){
  const {data,currentMonday}=getHeatmapData();
  const today=fmt8(new Date());
  const [tip,setTip]=useState(null);
  const DAY_LABELS=['M','T','W','T','F','S','S'];
  const rows=[];
  for(let r=0;r<52;r++){
    const weekStart=new Date(currentMonday);weekStart.setDate(currentMonday.getDate()-r*7);
    const cells=[];
    for(let c=0;c<7;c++){
      const d=new Date(weekStart);d.setDate(weekStart.getDate()+c);
      const ds=fmt8(d);
      const isFuture=ds>today;
      const entry=data[ds];
      const count=isFuture?0:(entry?.count||0);
      cells.push(
        <div key={c} onClick={()=>count>0?setTip(t=>t===ds?null:ds):null}
          style={{width:10,height:10,borderRadius:3,background:isFuture?'transparent':heatmapCellColor(count),
            cursor:count>0?'pointer':'default',flexShrink:0}}/>
      );
    }
    rows.push(<div key={r} style={{display:'flex',gap:2}}>{cells}</div>);
  }
  return(
    <div>
      <div style={{display:'flex',gap:2,marginBottom:4}}>
        {DAY_LABELS.map((l,i)=><div key={i} style={{width:10,fontSize:8,color:'var(--t3)',textAlign:'center',flexShrink:0}}>{l}</div>)}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:2}}>{rows}</div>
      {tip&&data[tip]&&(
        <div style={{marginTop:10,padding:'8px 12px',background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:10,fontSize:12,color:'var(--text)'}}>
          <div style={{fontWeight:600,marginBottom:2}}>{tip.slice(0,4)+'-'+tip.slice(4,6)+'-'+tip.slice(6)}</div>
          {data[tip].names.map((n,i)=><div key={i} style={{color:'var(--t2)'}}>{n}</div>)}
        </div>
      )}
    </div>
  );
}

/* ── HISTORY VIEW ── */
function HistoryView({refresh}){
  const [f,setF]=useState('all');
  const [editWorkout,setEditWorkout]=useState(null);
  const [editMeas,setEditMeas]=useState(null);
  const [,tick]=useReducer(x=>x+1,0);
  const reload=()=>{tick();if(refresh)refresh();};
  const all=[
    ...state.workouts.filter(w=>w.id!==state.activeWorkoutId&&w.endedAt).map(w=>({type:'workout',createdAt:w.createdAt,data:w})),
    ...state.bodyMeasurements.map(m=>({type:'measurement',createdAt:m.createdAt,data:m}))
  ].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const list=f==='workouts'?all.filter(e=>e.type==='workout'):f==='body'?all.filter(e=>e.type==='measurement'):all;
  return(
    <div className="sc" style={{padding:'16px 20px 20px'}}>
      <div style={{marginBottom:20}}><div className="pg-eye">Activity</div><div className="pg-h">History</div></div>
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['all','workouts','body'].map(v=>(
          <button key={v} onClick={()=>setF(v)} style={{height:32,padding:'0 14px',borderRadius:16,cursor:'pointer',
            background:f===v?'var(--brand)':'var(--s1)',border:`1px solid ${f===v?'transparent':'var(--bd)'}`,
            color:f===v?'#fff':'var(--t2)',fontSize:11,fontWeight:700,letterSpacing:'.04em',textTransform:'capitalize'}}>
            {v==='all'?'All':v==='workouts'?'Workouts':'Body'}
          </button>
        ))}
      </div>
      {list.length===0?(
        <div className="empty">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="17" stroke="var(--t3)" strokeWidth="1.2"/><path d="M12 18h12M18 12v12" stroke="var(--t3)" strokeWidth="1.4" strokeLinecap="round" opacity=".4"/></svg>
          <div style={{fontFamily:'var(--fh)',fontSize:15,fontWeight:700,color:'var(--t2)'}}>Nothing here yet</div>
          <div style={{fontSize:12,color:'var(--t3)',lineHeight:1.5}}>{f==='body'?'Log body measurements in Stats':'Complete a workout to see your history'}</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {list.map((entry,i)=>{
            if(entry.type==='workout'){
              const w=entry.data;
              const vol=workoutVolume(w);
              const dur=w.endedAt?Math.round((new Date(w.endedAt)-new Date(w.createdAt))/60000):null;
              return(
                <div key={w.id} style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:18,padding:'14px 16px'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                        <div style={{width:7,height:7,borderRadius:'50%',background:'var(--brand)',flexShrink:0}}/>
                        <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{w.name}</div>
                      </div>
                      <div style={{fontSize:12,color:'var(--t2)',paddingLeft:15}}>{formatDate(w.createdAt)}{dur?` · ${dur} min`:''} · {Math.round(vol).toLocaleString()} kg</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="gh" style={{flex:1,height:34,fontSize:12}} onClick={()=>setEditWorkout(w)}>Edit</button>
                    <button className="gh" style={{height:34,fontSize:12,padding:'0 14px',color:'var(--danger)',borderColor:'rgba(239,68,68,.3)'}}
                      onClick={()=>{if(confirm('Delete this workout?')){deleteWorkoutFromHistory(w.id);reload();}}}>Delete</button>
                  </div>
                </div>
              );
            } else {
              const m=entry.data;
              return(
                <div key={m.id||i} style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:18,padding:'14px 16px'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10}}>
                    <div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                        <div style={{width:7,height:7,borderRadius:'50%',background:'var(--t3)',flexShrink:0}}/>
                        <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>Body Measurement</div>
                      </div>
                      <div style={{fontSize:12,color:'var(--t2)',paddingLeft:15}}>
                        {formatDate(m.createdAt)}{m.bodyWeight?` · ${m.bodyWeight} kg`:''}
                        {m.bodyFat?` · ${m.bodyFat}% fat`:''}
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="gh" style={{flex:1,height:34,fontSize:12}} onClick={()=>setEditMeas(m)}>Edit</button>
                    <button className="gh" style={{height:34,fontSize:12,padding:'0 14px',color:'var(--danger)',borderColor:'rgba(239,68,68,.3)'}}
                      onClick={()=>{if(confirm('Delete this measurement?')){deleteBodyMeasurement(m.id);reload();}}}>Delete</button>
                  </div>
                </div>
              );
            }
          })}
        </div>
      )}
      {editWorkout&&<WorkoutHistorySheet workout={editWorkout} onClose={()=>setEditWorkout(null)} onSaved={()=>{setEditWorkout(null);reload();}}/>}
      {editMeas&&<MeasurementHistorySheet measurement={editMeas} onClose={()=>setEditMeas(null)} onSaved={()=>{setEditMeas(null);reload();}}/>}
    </div>
  );
}

                </div>

function MeasurementHistorySheet({measurement,onClose,onSaved}){
  const [bw,setBw]=useState(measurement.bodyWeight!=null?String(measurement.bodyWeight):'');
  const [bf,setBf]=useState(measurement.bodyFat!=null?String(measurement.bodyFat):'');
  const [mm,setMm]=useState(measurement.muscleWeight!=null?String(measurement.muscleWeight):'');
  const doSave=()=>{
    const fields={};
    if(bw!=='')fields.bodyWeight=parseFloat(bw)||null;
    if(bf!=='')fields.bodyFat=parseFloat(bf)||null;
    if(mm!=='')fields.muscleWeight=parseFloat(mm)||null;
    updateBodyMeasurement(measurement.id,fields);
    onSaved();window._forgeToast?.('Measurement updated');
  };
  const doDelete=()=>{deleteBodyMeasurement(measurement.id);onSaved();window._forgeToast?.('Measurement deleted');};
  return(
    <SheetPortal>
      <div className="sheet-scrim" onClick={onClose}/>
      <div className="sheet" style={{padding:'18px 22px 44px',overflowY:'auto',maxHeight:'90%',WebkitOverflowScrolling:'touch',overscrollBehavior:'contain'}}>
        <div style={{width:36,height:4,borderRadius:2,background:'var(--bd2)',margin:'0 auto 18px'}}/>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--t3)',marginBottom:4}}>Body Measurement</div>
        <div style={{fontSize:12,color:'var(--t3)',marginBottom:18}}>{formatDate(measurement.createdAt)}</div>
        {[{l:'Body Weight',u:'kg',v:bw,s:setBw},{l:'Fat %',u:'%',v:bf,s:setBf},{l:'Muscle Weight',u:'kg',v:mm,s:setMm}].map(f=>(
          <div key={f.l} style={{marginBottom:14}}>
            <div style={{fontSize:11,color:'var(--t2)',fontWeight:600,marginBottom:6}}>{f.l} <span style={{color:'var(--t3)',fontSize:10}}>({f.u})</span></div>
            <input type="number" step="0.1" value={f.v} onChange={e=>f.s(e.target.value)} placeholder="—"
              style={{width:'100%',height:50,borderRadius:12,background:'var(--s2)',border:'1px solid '+(f.v?'var(--bbd)':'var(--bd)'),color:'var(--text)',fontFamily:'var(--fh)',fontSize:22,fontWeight:700,padding:'0 16px',outline:'none',fontVariantNumeric:'tabular-nums'}}/>

        ))}
        <div style={{height:10}}/>

      </div>

function MuscleGroupPicker({selected,onChange,label,accent}){
  const toggle=(m)=>onChange(selected.includes(m)?selected.filter(x=>x!==m):[...selected,m]);
  const allGroups=getMuscleGroups();
  const selStyle=accent==='primary'
    ?{background:'var(--bsoft)',border:'1px solid var(--bbd)',color:'var(--brand2)'}
    :{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.25)',color:'var(--t1)'};
  return(
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--t3)'}}>{label}</span>
        {selected.length>0&&<button onClick={()=>onChange([])} style={{fontSize:10,color:'var(--t3)',background:'none',border:'none',cursor:'pointer',padding:0}}>Clear</button>}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {allGroups.map(m=>{
          const sel=selected.includes(m);
          return(
            <button key={m} onClick={()=>toggle(m)} style={{padding:'5px 12px',borderRadius:99,fontSize:12,
              fontWeight:600,cursor:'pointer',transition:'all .12s',
              ...(sel?selStyle:{background:'rgba(255,255,255,.04)',border:'1px solid var(--bd)',color:'var(--t3)'})}}>
              {m}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function ExercisesView(){
  const [q,setQ]=useState('');
  const [editMode,setEditMode]=useState(false);
  const [exSheet,setExSheet]=useState(null);
  const [showMuscles,setShowMuscles]=useState(false);
  const [newMuscle,setNewMuscle]=useState('');
  const [renaming,setRenaming]=useState(null);
  const [renamVal,setRenamVal]=useState('');
  const [,tick]=useReducer(x=>x+1,0);
  const refresh=()=>tick();
  const list=state.exercises.slice().sort((a,b)=>a.name.localeCompare(b.name)).filter(e=>e.name.toLowerCase().includes(q.toLowerCase()));
  const doRemove=(id)=>{deleteExercise(id);refresh();};
  const doSave=(ex)=>{
    const idx=state.exercises.findIndex(e=>e.id===ex.id);
    if(idx<0){
      const dup=state.exercises.some(e=>e.name.trim().toLowerCase()===ex.name.trim().toLowerCase());
      if(dup){window._forgeToast?.('Exercise already exists');return;}
    }
    const normalized=normalizeExercise(ex);
    if(idx>=0){state.exercises[idx]=normalized;}else{state.exercises.push(normalized);}
    rememberMuscleTags('primary',parseMuscleGroups(ex.primaryMuscleGroups));
    saveState();refresh();setExSheet(null);
  };
  const doAddMuscle=()=>{
    if(!newMuscle.trim())return;
    const ok=addMuscleGroup(newMuscle.trim());
    if(ok){setNewMuscle('');refresh();}else{window._forgeToast?.('Muscle already exists');}
  };
  const doRename=(old)=>{
    if(!renamVal.trim())return;
    const ok=renameMuscleGroup(old,renamVal.trim());
    if(ok){setRenaming(null);setRenamVal('');refresh();}else{window._forgeToast?.('Name already used');}
  };
  return(
    <div className="sc" style={{padding:'16px 20px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:20}}>
        <div><div className="pg-eye">Your Library</div><div className="pg-h">Exercises</div></div>
        <button className="gh" style={{height:30,fontSize:11,padding:'0 12px',marginBottom:5,
          color:editMode?'var(--brand2)':'var(--t2)',background:editMode?'var(--bsoft)':'rgba(255,255,255,.05)',borderColor:editMode?'var(--bbd)':'var(--bd2)'}}
          onClick={()=>setEditMode(v=>!v)}>{editMode?'Done':'Edit'}</button>
      </div>
      <div style={{position:'relative',marginBottom:16}}>
        <input type="search" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search exercises…"
          style={{width:'100%',height:46,borderRadius:14,background:'var(--s1)',border:'1px solid var(--bd)',
            color:'var(--text)',fontSize:14,padding:'0 16px',fontFamily:'inherit'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{fontSize:12,color:'var(--t3)'}}>{state.exercises.length} exercise{state.exercises.length!==1?'s':''}</span>
        <button className="gh" style={{height:30,fontSize:11,padding:'0 12px'}} onClick={()=>setExSheet({item:null})}>+ Add</button>
      </div>
      {list.length===0?(
        <div className="empty">
          <div style={{fontFamily:'var(--fh)',fontSize:15,fontWeight:700,color:'var(--t2)'}}>No exercises found</div>
          <button className="cta" style={{width:'auto',height:40,padding:'0 24px',marginTop:4,fontSize:13}} onClick={()=>setQ('')}>Clear search</button>

function playRestAlertTone(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type='sine';osc.frequency.value=440;
    gain.gain.value=0.3;
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start();osc.stop(ctx.currentTime+0.12);
    osc.onended=()=>ctx.close();
  }catch(e){}
}

function App(){
  const [t,setTweak]=useTweaks(TDEFS);
  const [view,setView]=useState('workouts');
  const [inSess,setInSess]=useState(!!state.activeWorkoutId);
  const [sheet,setSheet]=useState(null);
  const [bodyLogOpen,setBodyLogOpen]=useState(false);
  const [dir,setDir]=useState(0);
  const [toastMsg,setToastMsg]=useState(null);
  const [rest,setRest]=useState(0);
  const [restOn,setRestOn]=useState(false);
  const [summaryWorkoutId,setSummaryWorkoutId]=useState(null);
  const [,forceUpdate]=useReducer(x=>x+1,0);
  const toastTimer=useRef(null);

  const refresh=useCallback(()=>forceUpdate(),[forceUpdate]);

  useEffect(()=>{
    window._forgeRefresh=refresh;
    window._forgeToast=(msg)=>{
      setToastMsg(msg);
      clearTimeout(toastTimer.current);
      toastTimer.current=setTimeout(()=>setToastMsg(null),2200);
    };
    window._forgeSetView=(v)=>{
      if(v==='session'){setDir(0);setInSess(true);}
      else{setDir(-1);setInSess(false);if(v==='workouts')setView('workouts');}
    };
    window._forgeStartTimer=(secs)=>{setRest(Math.round(secs));setRestOn(true);};
    window._forgeStopTimer=()=>setRestOn(false);
    return()=>{delete window._forgeRefresh;delete window._forgeToast;delete window._forgeSetView;delete window._forgeStartTimer;delete window._forgeStopTimer;};
  },[refresh]);

  useEffect(()=>{
    const hex=t.accent;const m=ACCENT_MAP[hex]||ACCENT_MAP['#4f66ff'];
    const r=document.documentElement;
    r.style.setProperty('--brand',hex);r.style.setProperty('--brgb',`${m.r},${m.g},${m.b}`);
    r.style.setProperty('--brand2',m.b2);r.style.setProperty('--bsoft',`rgba(${m.r},${m.g},${m.b},.1)`);
    r.style.setProperty('--bbd',`rgba(${m.r},${m.g},${m.b},.22)`);
  },[t.accent]);

  useEffect(()=>{
    if(!restOn)return;
    const t2=setInterval(()=>setRest(s=>{if(s<=1){setRestOn(false);window._forgeToast?.('Rest complete');if(state.settings.audioRestAlert)playRestAlertTone();return 0;}return s-1;}),1000);
    return()=>clearInterval(t2);
  },[restOn]);

  const goTo=(v)=>{
    const cur=inSess?5:(NAV_ORDER[view]??2);const nxt=NAV_ORDER[v]??2;
    setDir(nxt>cur?1:-1);setInSess(false);setSheet(null);setView(v);
  };
  const startSess=(routine)=>{
    if(routine){setSheet(routine);}
    else{startWorkout(null);setInSess(true);}
  };
  const confirmSess=(routine)=>{setSheet(null);startWorkout(routine.id);setInSess(true);};
  const finishSess=()=>{const cid=state.activeWorkoutId;endWorkout();setSummaryWorkoutId(cid);};
  const dismissSummary=()=>{setSummaryWorkoutId(null);setInSess(false);setDir(-1);};
  const discardSess=()=>{cancelWorkout();setInSess(false);setDir(-1);};

  const animCls=dir===0?'tu':dir>0?'tr':'tl';
  const vk=inSess?'sess':view;

  const renderV=()=>{
    if(inSess)return <SessionView onFinish={finishSess} onDiscard={discardSess} rest={rest} restOn={restOn} setRest={setRest} setRestOn={setRestOn}/>;
    switch(view){
      case 'stats':return <StatsView onBodyLog={()=>setBodyLogOpen(true)}/>;
      case 'history':return <HistoryView refresh={refresh}/>;
      case 'exercises':return <ExercisesView/>;
      case 'tools':return <ToolsView refresh={refresh}/>;
      default:return <WorkoutsView onStart={startSess} refresh={refresh}/>;
    }
  };

  return(
    <div className="app-shell">
      <div className="app-col">
        <div key={vk} className={animCls} style={{flex:1,overflow:'hidden',minHeight:0,display:'flex',flexDirection:'column'}}>
          {renderV()}
        </div>
        {!inSess&&(
          <div style={{flexShrink:0,padding:'8px 14px',paddingBottom:'calc(8px + env(safe-area-inset-bottom, 0px))',position:'relative',zIndex:2}}>
            <Nav active={view} set={goTo}/>
          </div>
        )}
        {inSess&&<div style={{height:'env(safe-area-inset-bottom, 0px)'}}/>}
        {sheet&&<TemplateSheet routine={sheet} onStart={()=>confirmSess(sheet)} onClose={()=>setSheet(null)}/>}
        {bodyLogOpen&&<BodyLogSheet onClose={()=>setBodyLogOpen(false)} onSaved={refresh}/>}
        {summaryWorkoutId&&<SessionSummarySheet workoutId={summaryWorkoutId} onDismiss={dismissSummary}/>}
      </div>
      {toastMsg&&<div className="toast">{toastMsg}</div>}
      <TweaksPanel>
        <TweakSection label="Accent"/>
        <TweakColor label="Color" value={t.accent} options={['#4f66ff','#8b5cf6','#0ea5e9']} onChange={v=>setTweak('accent',v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
